services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: agentic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  agent-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: agent-app
    volumes:
      - .:/app
    ports:
      - "8080:8080"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data:
